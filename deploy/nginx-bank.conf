# ============================================================
#  deploy/nginx-bank.conf — Nginx reverse proxy жишээ
#  /etc/nginx/sites-available/bank → sites-enabled/ руу symlink
#
#  Бүх замыг дотоод API (:3000) руу proxy (API нь dashboard-ийг serve хийдэг).
#  HTTPS блокийг `certbot --nginx -d <SUBDOMAIN>.duckdns.org` АВТОМАТААР нэмж,
#  HTTP→HTTPS redirect тохируулна (энэ файлд гараар бичих шаардлагагүй).
# ============================================================

server {
    listen 80;
    server_name <SUBDOMAIN>.duckdns.org;   # жишээ: golomt-fin.duckdns.org

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    client_max_body_size 1m;
}
